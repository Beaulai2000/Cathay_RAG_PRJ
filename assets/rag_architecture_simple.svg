<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif; fill: #0f172a; }
      .lane-title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif; fill: #334155; }
      .small { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif; fill: #475569; }
      .lane-offline { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; }
      .lane-online { fill: #f0fdf4; stroke: #86efac; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 12; ry: 12; }
      .decision { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .line-dashed { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="920" fill="#f8fafc" />
  <text x="800" y="58" text-anchor="middle" class="title">Travel Inconvenience Insurance RAG Architecture (Simple)</text>

  <!-- Offline lane -->
  <rect x="70" y="95" width="1460" height="295" class="lane-offline" rx="16" ry="16" />
  <text x="110" y="135" class="lane-title">Offline (build once, update when policy changes)</text>

  <rect x="120" y="175" width="360" height="150" class="box" />
  <text x="145" y="214" class="box-title">Policy Text Input</text>
  <text x="145" y="244" class="box-text">- data/policy_clean/policy_clean.txt</text>
  <text x="145" y="270" class="box-text">- 條款清理後文本</text>

  <rect x="560" y="175" width="420" height="150" class="box" />
  <text x="585" y="214" class="box-title">Chunking + Metadata</text>
  <text x="585" y="244" class="box-text">- article-aware chunking (700/100)</text>
  <text x="585" y="270" class="box-text">- metadata: chunk_id / article_id / section</text>
  <text x="585" y="296" class="box-text">- src/ingestion.py</text>

  <rect x="1060" y="175" width="400" height="150" class="box" />
  <text x="1085" y="214" class="box-title">Vector Index Build</text>
  <text x="1085" y="244" class="box-text">- embeddings: text-embedding-3-small</text>
  <text x="1085" y="270" class="box-text">- Chroma: data/index/{embedding_model}</text>
  <text x="1085" y="296" class="box-text">- index_meta.json</text>

  <path d="M480 250 L560 250" class="line" />
  <path d="M980 250 L1060 250" class="line" />

  <!-- Online lane -->
  <rect x="70" y="425" width="1460" height="430" class="lane-online" rx="16" ry="16" />
  <text x="110" y="465" class="lane-title">Online (for every user query)</text>

  <rect x="100" y="535" width="210" height="115" class="box" />
  <text x="126" y="578" class="box-title">User Question</text>
  <text x="126" y="605" class="small">Gradio / CLI</text>

  <rect x="360" y="520" width="290" height="145" class="box" />
  <text x="385" y="560" class="box-title">Query Preprocess</text>
  <text x="385" y="587" class="box-text">- normalize aliases</text>
  <text x="385" y="612" class="box-text">- infer section</text>
  <text x="385" y="637" class="box-text">- follow-up rewrite</text>

  <polygon points="730,560 840,500 950,560 840,620" class="decision" />
  <text x="840" y="567" text-anchor="middle" class="box-text">Ambiguous?</text>

  <rect x="740" y="695" width="230" height="115" class="box" />
  <text x="764" y="735" class="box-title">Clarification</text>
  <text x="764" y="762" class="box-text">ask user to pick</text>
  <text x="764" y="787" class="box-text">insurance section</text>

  <rect x="1020" y="520" width="300" height="145" class="box" />
  <text x="1045" y="560" class="box-title">Retriever</text>
  <text x="1045" y="587" class="box-text">- top-k semantic search</text>
  <text x="1045" y="612" class="box-text">- optional section filter</text>
  <text x="1045" y="637" class="box-text">- src/retrievers/semantic.py</text>

  <rect x="1360" y="520" width="150" height="145" class="box" />
  <text x="1380" y="560" class="box-title">LLM</text>
  <text x="1380" y="587" class="box-text">answer from</text>
  <text x="1380" y="612" class="box-text">retrieved</text>
  <text x="1380" y="637" class="box-text">clauses</text>

  <rect x="1290" y="700" width="240" height="120" class="box" />
  <text x="1315" y="740" class="box-title">Final Response</text>
  <text x="1315" y="767" class="box-text">中文回答 + 條款引用</text>
  <text x="1315" y="792" class="small">(article_id evidence)</text>

  <path d="M310 592 L360 592" class="line" />
  <path d="M650 592 L730 592" class="line" />
  <path d="M950 560 L1020 592" class="line" />
  <path d="M1320 592 L1360 592" class="line" />
  <path d="M1435 665 L1410 700" class="line" />

  <!-- Clarification branch -->
  <path d="M840 620 L840 695" class="line" />
  <text x="860" y="665" class="small">Yes</text>
  <path d="M740 752 L205 752 L205 650" class="line-dashed" />
  <text x="472" y="740" class="small">user clarifies and asks again</text>
  <text x="975" y="550" class="small">No</text>

  <!-- Index connection -->
  <path d="M1260 325 L1170 520" class="line-dashed" />
  <text x="1185" y="410" class="small">load built index</text>
</svg>
