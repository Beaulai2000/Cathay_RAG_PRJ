<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 36px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif; fill: #0f172a; }
      .lane-title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif; fill: #334155; }
      .small { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif; fill: #475569; }
      .lane-offline { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; }
      .lane-online { fill: #f0fdf4; stroke: #86efac; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 12; ry: 12; }
      .decision { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .note-panel { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2; rx: 14; ry: 14; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .line-dashed { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="980" fill="#f8fafc" />
  <text x="900" y="60" text-anchor="middle" class="title">旅遊不便險 RAG 架構圖（中文版）</text>

  <!-- Offline lane -->
  <rect x="70" y="100" width="1320" height="310" class="lane-offline" rx="16" ry="16" />
  <text x="110" y="140" class="lane-title">離線建置階段（文件更新時執行）</text>

  <rect x="110" y="185" width="310" height="160" class="box" />
  <text x="132" y="226" class="box-title">條款文本輸入</text>
  <text x="132" y="255" class="box-text">- data/policy_clean/policy_clean.txt</text>
  <text x="132" y="282" class="box-text">- 清理後條款內容</text>

  <rect x="470" y="185" width="430" height="160" class="box" />
  <text x="492" y="226" class="box-title">Chunking + Metadata</text>
  <text x="492" y="255" class="box-text">- 先以條文標題切分（article-aware）</text>
  <text x="492" y="282" class="box-text">- 長條文逐行子切分 + overlap</text>
  <text x="492" y="309" class="box-text">- metadata: chunk_id / article_id / section</text>

  <rect x="950" y="185" width="390" height="160" class="box" />
  <text x="972" y="226" class="box-title">向量索引建置</text>
  <text x="972" y="255" class="box-text">- embedding: text-embedding-3-small</text>
  <text x="972" y="282" class="box-text">- Chroma: data/index/{embedding_model}</text>
  <text x="972" y="309" class="box-text">- index_meta.json（紀錄建置參數）</text>

  <path d="M420 265 L470 265" class="line" />
  <path d="M900 265 L950 265" class="line" />

  <!-- Online lane -->
  <rect x="70" y="435" width="1320" height="470" class="lane-online" rx="16" ry="16" />
  <text x="110" y="475" class="lane-title">線上問答階段（每次使用者提問）</text>

  <rect x="100" y="565" width="210" height="120" class="box" />
  <text x="123" y="608" class="box-title">使用者問題</text>
  <text x="123" y="636" class="small">Gradio / CLI</text>

  <rect x="350" y="550" width="320" height="160" class="box" />
  <text x="372" y="590" class="box-title">查詢前處理</text>
  <text x="372" y="618" class="box-text">- 同義詞正規化（alias）</text>
  <text x="372" y="645" class="box-text">- section 推斷</text>
  <text x="372" y="672" class="box-text">- follow-up 重寫</text>

  <polygon points="740,595 860,530 980,595 860,660" class="decision" />
  <text x="860" y="602" text-anchor="middle" class="box-text">問題是否模糊？</text>

  <rect x="760" y="735" width="220" height="125" class="box" />
  <text x="783" y="778" class="box-title">澄清問題</text>
  <text x="783" y="806" class="box-text">請使用者指定險種</text>
  <text x="783" y="833" class="small">再重新進入流程</text>

  <rect x="1030" y="550" width="320" height="160" class="box" />
  <text x="1052" y="590" class="box-title">Retriever 檢索</text>
  <text x="1052" y="618" class="box-text">- semantic search（top-k）</text>
  <text x="1052" y="645" class="box-text">- 可加 section filter</text>
  <text x="1052" y="672" class="box-text">- 回傳含 metadata 的 chunks</text>

  <rect x="1030" y="755" width="320" height="125" class="box" />
  <text x="1052" y="797" class="box-title">LLM 回答生成</text>
  <text x="1052" y="825" class="box-text">僅依據檢索條款回答</text>
  <text x="1052" y="852" class="box-text">最後列出條款編號</text>

  <rect x="105" y="755" width="565" height="125" class="box" />
  <text x="128" y="797" class="box-title">最終輸出</text>
  <text x="128" y="825" class="box-text">中文回答 + 引用條款（article_id）+ 無法判定時明確回覆「條款未明確規範」</text>

  <path d="M310 625 L350 625" class="line" />
  <path d="M670 625 L740 625" class="line" />
  <path d="M980 595 L1030 625" class="line" />
  <path d="M1190 710 L1190 755" class="line" />
  <path d="M1030 817 L670 817" class="line" />

  <path d="M860 660 L860 735" class="line" />
  <text x="882" y="699" class="small">是</text>
  <path d="M760 797 L245 797 L245 685" class="line-dashed" />
  <text x="455" y="785" class="small">使用者補充後再次提問</text>
  <text x="995" y="585" class="small">否</text>

  <path d="M1140 345 L1140 550" class="line-dashed" />
  <text x="1158" y="455" class="small">載入已建好的索引</text>

  <!-- Right note panel -->
  <rect x="1430" y="100" width="320" height="805" class="note-panel" />
  <text x="1452" y="140" class="box-title">參數與策略摘要</text>
  <text x="1452" y="175" class="box-text">Chunking：</text>
  <text x="1452" y="202" class="small">1) 條文標題切分（第X條）</text>
  <text x="1452" y="227" class="small">2) 長條文逐行子切分</text>
  <text x="1452" y="252" class="small">3) 保留 overlap 避免語意斷裂</text>

  <text x="1452" y="295" class="box-text">預設參數：</text>
  <text x="1452" y="322" class="small">- chunk_size = 700</text>
  <text x="1452" y="347" class="small">- chunk_overlap = 100</text>
  <text x="1452" y="372" class="small">- retriever_top_k = 5</text>
  <text x="1452" y="397" class="small">- history_window = 3</text>

  <text x="1452" y="440" class="box-text">模型：</text>
  <text x="1452" y="467" class="small">- LLM: gpt-4.1（預設）</text>
  <text x="1452" y="492" class="small">- Embedding: text-embedding-3-small</text>

  <text x="1452" y="535" class="box-text">Metadata：</text>
  <text x="1452" y="562" class="small">- chunk_id</text>
  <text x="1452" y="587" class="small">- article_id（引用來源）</text>
  <text x="1452" y="612" class="small">- section（險種過濾）</text>

  <text x="1452" y="655" class="box-text">查詢策略：</text>
  <text x="1452" y="682" class="small">- alias 正規化</text>
  <text x="1452" y="707" class="small">- 模糊題先澄清</text>
  <text x="1452" y="732" class="small">- follow-up 重寫後檢索</text>
  <text x="1452" y="757" class="small">- section-aware retrieval</text>
</svg>
